name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            runner: windows-latest
            rid: win-x64
            artifact: duets-windows-x64
            binary: duets.exe

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
          include-prerelease: true

      - name: Cache LLM model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: src/Duets.Agents/models/model.gguf
          key: llm-model-gemma-3-1b-it-Q8_0

      - name: Download LLM model
        if: steps.cache-model.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src/Duets.Agents/models" | Out-Null
          curl.exe -L --fail -o "src/Duets.Agents/models/model.gguf" "https://huggingface.co/unsloth/gemma-3-1b-it-GGUF/resolve/main/gemma-3-1b-it-Q8_0.gguf"

      - name: Publish
        run: >
          dotnet publish src/Duets.Cli/Duets.Cli.fsproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:ErrorOnDuplicatePublishOutputFiles=false
          --output publish/${{ matrix.rid }}

      - name: Zip output
        shell: pwsh
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
